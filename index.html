<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格生成器 - 在线创建、编辑、导入导出表格</title>
    <meta name="description" content="免费在线表格生成器，支持在线编辑、文本转表格、导入CSV/Excel文件，导出CSV和Excel格式，纯前端处理，数据安全无忧。">
    <meta name="keywords" content="表格生成器,在线表格,CSV导出,Excel导出,文本转表格,在线编辑表格">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://table-gen.pages.dev/">
    <meta property="og:title" content="表格生成器 - 在线创建、编辑、导入导出表格">
    <meta property="og:description" content="免费在线表格生成器，支持在线编辑、文本转表格、导入CSV/Excel文件。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://table-gen.pages.dev/">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="表格生成器">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "表格生成器",
        "url": "https://table-gen.pages.dev/",
        "description": "免费在线表格生成器，支持在线编辑、文本转表格、导入CSV/Excel文件，导出CSV和Excel格式。",
        "applicationCategory": "UtilityApplication",

        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" }

    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .msg-in { animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .dot-typing { display: inline-flex; gap: 4px; align-items: center; }
        .dot-typing span { width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; animation: dotBounce 1.2s infinite; }
        .dot-typing span:nth-child(2) { animation-delay: 0.2s; }
        .dot-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce { 0%,80%,100% { transform: scale(0.6); opacity:0.4; } 40% { transform: scale(1); opacity:1; } }
        .drop-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(59,130,246,0.12); border: 3px dashed #3b82f6; display: none; align-items: center; justify-content: center; }
        .drop-overlay.active { display: flex; }
        /* In-chat table styles */
        .chat-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .chat-table th, .chat-table td { border: 1px solid #d1d5db; padding: 4px 8px; text-align: left; min-width: 60px; font-size: 0.8rem; }
        .chat-table thead th { background: #f1f5f9; font-weight: 600; color: #374151; }
        .chat-table tbody td { color: #1f2937; }
        .chat-table [contenteditable]:focus { outline: 2px solid #3b82f6; outline-offset: -2px; background: #eff6ff; }
        .chat-table [contenteditable]:hover { background: #f8fafc; }
        /* Fullscreen editor */
        #fullEditor { display: none; position: fixed; inset: 0; z-index: 200; background: #f9fafb; flex-direction: column; }
        #fullEditor.active { display: flex; }
        #fullEditor .editor-table { border-collapse: collapse; width: 100%; }
        #fullEditor .editor-table th, #fullEditor .editor-table td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; min-width: 100px; font-size: 0.875rem; }
        #fullEditor .editor-table thead th { background: #f8fafc; font-weight: 600; color: #374151; position: sticky; top: 0; z-index: 1; }
        #fullEditor [contenteditable]:focus { outline: 2px solid #3b82f6; outline-offset: -2px; background: #eff6ff; }
        #fullEditor [contenteditable]:hover { background: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="shrink-0 bg-white border-b border-gray-200 shadow-sm z-10">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-500 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M3 6h18M3 18h18M7 6v12M17 6v12"/>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-800 leading-tight">表格生成器</h1>
                <p class="text-xs text-gray-400">对话式表格创建 · 纯本地处理</p>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chatArea" class="flex-1 overflow-y-auto chat-scroll px-4 py-6">
        <div class="max-w-3xl mx-auto space-y-4" id="chatMessages"></div>
    </div>

    <!-- Drop Overlay -->
    <div id="dropOverlay" class="drop-overlay">
        <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
            <svg class="w-16 h-16 mx-auto text-blue-500 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p class="text-lg font-semibold text-blue-600">释放文件即可导入</p>
            <p class="text-sm text-gray-400 mt-1">支持 CSV / Excel 文件</p>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="shrink-0 bg-white border-t border-gray-200">
        <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex items-center gap-2">
                <button id="uploadBtn" class="shrink-0 w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-xl flex items-center justify-center transition-colors" title="上传 CSV/Excel">
                    <svg class="w-5 h-5 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </button>
                <button id="manualBtn" class="shrink-0 w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-xl flex items-center justify-center transition-colors" title="手动编辑">
                    <svg class="w-5 h-5 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                </button>
                <input id="textMsg" type="text" class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="描述表格 / 粘贴数据 / 回车发送...">
                <button id="sendBtn" class="shrink-0 w-10 h-10 bg-blue-500 hover:bg-blue-600 rounded-xl flex items-center justify-center transition-colors">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".csv,.xlsx,.xls">
            </div>
            <p class="text-center text-xs text-gray-300 mt-2">纯前端处理，数据不上传服务器 &copy; 2025 表格生成器</p>
        </div>
    </footer>

    <!-- Fullscreen Editor -->
    <div id="fullEditor">
        <div class="shrink-0 bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 flex-wrap">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </div>
            <span class="font-bold text-gray-800">表格编辑模式</span>
            <div class="flex-1"></div>
            <button onclick="editorAddRow()" class="px-3 py-1.5 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600">+ 行</button>
            <button onclick="editorAddCol()" class="px-3 py-1.5 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600">+ 列</button>
            <button onclick="editorDelRow()" class="px-3 py-1.5 bg-red-100 text-red-600 text-sm rounded-lg hover:bg-red-200">- 行</button>
            <button onclick="editorDelCol()" class="px-3 py-1.5 bg-red-100 text-red-600 text-sm rounded-lg hover:bg-red-200">- 列</button>
            <div class="w-px h-6 bg-gray-300"></div>
            <button onclick="editorExportCSV()" class="px-3 py-1.5 bg-gray-100 text-gray-700 text-sm rounded-lg hover:bg-gray-200">导出 CSV</button>
            <button onclick="editorExportExcel()" class="px-3 py-1.5 bg-gray-100 text-gray-700 text-sm rounded-lg hover:bg-gray-200">导出 Excel</button>
            <button onclick="editorDone()" class="px-3 py-1.5 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 font-medium">✓ 完成</button>
        </div>
        <div class="flex-1 overflow-auto p-4">
            <div id="editorTableContainer"></div>
        </div>
    </div>

    <script>
        // ===== State =====
        let tableData = [];
        let editorTableId = 0;
        const DEFAULT_ROWS = 5, DEFAULT_COLS = 5;

        // ===== DOM =====
        const chatMessages = document.getElementById('chatMessages');
        const chatArea = document.getElementById('chatArea');
        const textMsg = document.getElementById('textMsg');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const manualBtn = document.getElementById('manualBtn');
        const fileInput = document.getElementById('fileInput');
        const dropOverlay = document.getElementById('dropOverlay');

        // ===== Helpers =====
        function scrollBottom() { chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function formatSize(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }
        function getColLetter(i) { let r=''; let n=i; do { r=String.fromCharCode(65+(n%26))+r; n=Math.floor(n/26)-1; } while(n>=0); return r; }

        function addBotMessage(html) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 msg-in';
            div.innerHTML = `
                <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 px-4 py-3 max-w-[90%] text-sm text-gray-700 leading-relaxed">${html}</div>`;
            chatMessages.appendChild(div);
            scrollBottom();
            return div;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 justify-end msg-in';
            div.innerHTML = `
                <div class="bg-blue-500 text-white rounded-2xl rounded-tr-sm shadow-sm px-4 py-3 max-w-[85%] text-sm leading-relaxed break-all">${escapeHtml(text)}</div>
                <div class="shrink-0 w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>`;
            chatMessages.appendChild(div);
            scrollBottom();
        }

        function addTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex items-start gap-3 msg-in';
            div.innerHTML = `
                <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 px-4 py-3">
                    <div class="dot-typing"><span></span><span></span><span></span></div>
                </div>`;
            chatMessages.appendChild(div);
            scrollBottom();
        }
        function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

        // ===== Welcome =====
        addBotMessage(`你好！我是表格助手 📊<br><br>你可以：<br>• 直接描述需要的表格（如「3行4列空白表格」）<br>• 粘贴逗号或 Tab 分隔的数据<br>• 上传 CSV / Excel 文件<br>• 点击左下角 📐 手动编辑<br><br><span class="text-gray-400 text-xs">所有数据在浏览器本地处理，不会上传。</span>`);

        // ===== Table Rendering =====
        function renderTableHtml(data, editable, tableId) {
            if (!data.length) return '<p class="text-gray-400 text-xs">表格为空</p>';
            const maxCols = Math.max(...data.map(r => r.length));
            let html = '<div class="overflow-x-auto max-h-64 rounded-lg border border-gray-200"><table class="chat-table"><thead><tr>';
            html += '<th class="text-center text-xs text-gray-400 w-8 bg-gray-50">#</th>';
            for (let c = 0; c < maxCols; c++) html += `<th class="text-center">${getColLetter(c)}</th>`;
            html += '</tr></thead><tbody>';
            for (let r = 0; r < data.length; r++) {
                html += `<tr><td class="text-center text-xs text-gray-400 bg-gray-50">${r+1}</td>`;
                for (let c = 0; c < maxCols; c++) {
                    const val = (data[r] && data[r][c] !== undefined) ? data[r][c] : '';
                    if (editable) {
                        html += `<td contenteditable="true" data-tid="${tableId}" data-row="${r}" data-col="${c}" onblur="cellEdited(this)" onkeydown="cellKeydown(event,this)">${escapeHtml(String(val))}</td>`;
                    } else {
                        html += `<td>${escapeHtml(String(val))}</td>`;
                    }
                }
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            return html;
        }

        function cellEdited(el) {
            const tid = el.dataset.tid;
            const r = parseInt(el.dataset.row), c = parseInt(el.dataset.col);
            if (tableData[r]) tableData[r][c] = el.textContent;
        }

        function cellKeydown(e, el) {
            const r = parseInt(el.dataset.row), c = parseInt(el.dataset.col);
            const tid = el.dataset.tid;
            if (e.key === 'Tab') {
                e.preventDefault();
                const nc = e.shiftKey ? c-1 : c+1;
                const next = document.querySelector(`td[data-tid="${tid}"][data-row="${r}"][data-col="${nc}"]`);
                if (next) next.focus();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const nr = r+1;
                const next = document.querySelector(`td[data-tid="${tid}"][data-row="${nr}"][data-col="${c}"]`);
                if (next) next.focus();
            }
        }

        // ===== Table Actions in Chat =====
        function buildTableMsg(data, tid) {
            const tableHtml = renderTableHtml(data, true, tid);
            const rows = data.length, cols = data.length ? Math.max(...data.map(r=>r.length)) : 0;
            return `${tableHtml}<div class="flex flex-wrap items-center gap-2 mt-2 pt-2 border-t border-gray-100"><span class="text-xs text-gray-400 mr-auto">${rows} 行 × ${cols} 列</span><button onclick="tableAction(${tid},'csv')" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs rounded-lg">📄 导出 CSV</button><button onclick="tableAction(${tid},'xlsx')" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs rounded-lg">📊 导出 Excel</button><button onclick="tableAction(${tid},'edit')" class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded-lg">✏️ 全屏编辑</button></div>`;
        }

        // Store table snapshots by id
        const tableSnapshots = {};

        function addTableToChat(data) {
            editorTableId++;
            const tid = editorTableId;
            tableData = JSON.parse(JSON.stringify(data));
            tableSnapshots[tid] = JSON.parse(JSON.stringify(data));
            removeTyping();
            addBotMessage(buildTableMsg(data, tid));
        }

        function tableAction(tid, action) {
            const data = tableSnapshots[tid];
            if (!data) return;
            if (action === 'csv') exportCSV(data);
            else if (action === 'xlsx') exportExcel(data);
            else if (action === 'edit') openEditor(data);
        }

        // ===== Parse User Input =====
        function parseText(text) {
            const lines = text.trim().split('\n');
            return lines.map(line => {
                if (line.includes('\t')) return line.split('\t');
                return line.split(',').map(s => s.trim());
            });
        }

        function parseNaturalLanguage(text) {
            const t = text.toLowerCase();
            // Match patterns like "3行4列", "3行4列空白表格", "3*4表格"
            let m = text.match(/(\d+)\s*[行x×*]\s*(\d+)/);
            if (!m) m = text.match(/(\d+)\s*列.*?(\d+)\s*行/);
            if (m) {
                const rows = parseInt(m[1]) || parseInt(m[2]);
                const cols = parseInt(m[2]) || parseInt(m[1]);
                if (rows > 0 && cols > 0 && rows <= 100 && cols <= 20) {
                    return Array.from({length: rows}, () => Array(cols).fill(''));
                }
            }
            return null;
        }

        // ===== Handle User Input =====
        function handleInput(text) {
            if (!text.trim()) return;
            addUserMessage(text);
            addTyping();

            setTimeout(() => {
                // Try natural language first
                const nlTable = parseNaturalLanguage(text);
                if (nlTable) {
                    addTableToChat(nlTable);
                    return;
                }

                // Check if it looks like delimited data (has commas or tabs with newlines)
                if (text.includes('\n') && (text.includes(',') || text.includes('\t'))) {
                    const data = parseText(text);
                    if (data.length > 0 && data[0].length > 0) {
                        addTableToChat(data);
                        return;
                    }
                }

                // Single line with commas/tabs
                if ((text.includes(',') || text.includes('\t')) && !text.includes('\n')) {
                    const data = parseText(text);
                    if (data.length > 0 && data[0].length > 1) {
                        addTableToChat(data);
                        return;
                    }
                }

                // Fallback: create a single-column table
                const lines = text.trim().split('\n');
                if (lines.length > 1) {
                    const data = lines.map(l => [l.trim()]);
                    addTableToChat(data);
                    return;
                }

                removeTyping();
                addBotMessage(`我不太确定你想要的表格格式 😅 试试：<br>• 「3行4列空白表格」<br>• 粘贴逗号分隔的数据（如 姓名,年龄,城市）<br>• 上传 CSV / Excel 文件`);
            }, 500);
        }

        // ===== File Import =====
        function importFile(file) {
            addUserMessage(`📎 ${file.name} (${formatSize(file.size)})`);
            addTyping();
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    let parsed = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    parsed = parsed.filter(row => row.some(cell => cell !== ''));
                    setTimeout(() => addTableToChat(parsed), 500);
                } catch (err) {
                    removeTyping();
                    addBotMessage(`❌ 文件解析失败：${err.message}`);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ===== Export =====
        function getExportData(data) {
            const maxCols = Math.max(...data.map(r => r.length));
            return data.map(row => { const p = [...row]; while(p.length < maxCols) p.push(''); return p; });
        }
        function downloadBlob(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = name;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        function exportCSV(data) {
            if (!data.length) return;
            const ed = getExportData(data);
            const ws = XLSX.utils.aoa_to_sheet(ed);
            const csv = XLSX.utils.sheet_to_csv(ws);
            downloadBlob(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), '表格.csv');
        }
        function exportExcel(data) {
            if (!data.length) return;
            const ed = getExportData(data);
            const ws = XLSX.utils.aoa_to_sheet(ed);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
            XLSX.writeFile(wb, '表格.xlsx');
        }

        // ===== Fullscreen Editor =====
        function openEditor(data) {
            tableData = JSON.parse(JSON.stringify(data));
            document.getElementById('fullEditor').classList.add('active');
            renderEditor();
        }
        function editorDone() {
            document.getElementById('fullEditor').classList.remove('active');
            addBotMessage('✅ 已退出编辑模式。你可以继续描述新表格或导出数据。');
        }
        function renderEditor() {
            const container = document.getElementById('editorTableContainer');
            if (!tableData.length) { container.innerHTML = '<p class="text-gray-400 text-sm p-4">暂无数据</p>'; return; }
            const maxCols = Math.max(...tableData.map(r => r.length));
            let html = '<table class="editor-table"><thead><tr><th class="text-center text-xs text-gray-400 w-10">#</th>';
            for (let c = 0; c < maxCols; c++) html += `<th class="text-center">${getColLetter(c)}</th>`;
            html += '</tr></thead><tbody>';
            for (let r = 0; r < tableData.length; r++) {
                html += `<tr><td class="text-center text-xs text-gray-400 bg-gray-50">${r+1}</td>`;
                for (let c = 0; c < maxCols; c++) {
                    const val = (tableData[r] && tableData[r][c] !== undefined) ? tableData[r][c] : '';
                    html += `<td contenteditable="true" data-erow="${r}" data-ecol="${c}" onblur="editorCellEdit(this)" onkeydown="cellKeydown(event,this)">${escapeHtml(String(val))}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        function editorCellEdit(el) {
            const r = parseInt(el.dataset.erow), c = parseInt(el.dataset.ecol);
            if (tableData[r]) tableData[r][c] = el.textContent;
        }
        function editorAddRow() { const mc = tableData.length ? Math.max(...tableData.map(r=>r.length)) : DEFAULT_COLS; tableData.push(Array(mc).fill('')); renderEditor(); }
        function editorAddCol() { tableData.forEach(r => r.push('')); renderEditor(); }
        function editorDelRow() { if (tableData.length > 1) { tableData.pop(); renderEditor(); } }
        function editorDelCol() { const mc = tableData.length ? Math.max(...tableData.map(r=>r.length)) : 0; if (mc > 1) { tableData.forEach(r => r.pop()); renderEditor(); } }
        function editorExportCSV() { exportCSV(tableData); }
        function editorExportExcel() { exportExcel(tableData); }

        // ===== Event Listeners =====
        sendBtn.addEventListener('click', () => { const v = textMsg.value.trim(); if (v) { handleInput(v); textMsg.value = ''; } });
        textMsg.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });

        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) importFile(e.target.files[0]); e.target.value = ''; });

        manualBtn.addEventListener('click', () => {
            if (!tableData.length) tableData = Array.from({length: DEFAULT_ROWS}, () => Array(DEFAULT_COLS).fill(''));
            openEditor(tableData);
        });

        // Global drag & drop
        let dragCounter = 0;
        document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
        document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
            const files = Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.(csv|xlsx|xls)$/i));
            if (files.length) importFile(files[0]);
        });

        // Also sync tableSnapshots when editing in chat
        const origCellEdited = cellEdited;
        window.cellEdited = function(el) {
            origCellEdited(el);
            // Update snapshot for the table
            const tid = el.dataset.tid;
            if (tid && tableSnapshots[tid]) {
                tableSnapshots[tid] = JSON.parse(JSON.stringify(tableData));
            }
        };
    </script>
    <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
    </script>
</body>
</html>
