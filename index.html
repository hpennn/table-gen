    <script>
        // ===== Auth State =====
        let authToken = localStorage.getItem('auth_token');
        let currentUser = null;
        let pendingAction = null; // Stores a callback to execute after login

        // ===== Auth Functions =====
        function switchAuthTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
            // Clear errors
            document.getElementById('loginError').textContent = '';
            document.getElementById('regError').textContent = '';
        }

        async function doLogin() {
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if (!account || !password) { errorEl.textContent = '请输入账号和密码'; return; }
            if (password.length < 6) { errorEl.textContent = '密码至少6位'; return; }

            btn.disabled = true;
            btn.textContent = '登录中...';
            errorEl.textContent = '';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password }),
                });
                const data = await res.json();
                if (!res.ok) { errorEl.textContent = data.error || '登录失败'; return; }

                authToken = data.token;
                currentUser = data.user;
                localStorage.setItem('auth_token', authToken);
                onLoginSuccess();
            } catch (e) {
                errorEl.textContent = '网络错误，请重试';
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        async function doRegister() {
            const account = document.getElementById('regAccount').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            const errorEl = document.getElementById('regError');
            const btn = document.getElementById('regBtn');

            if (!account || !password) { errorEl.textContent = '请输入账号和密码'; return; }
            if (password.length < 6) { errorEl.textContent = '密码至少6位'; return; }
            if (password !== passwordConfirm) { errorEl.textContent = '两次密码不一致'; return; }

            btn.disabled = true;
            btn.textContent = '注册中...';
            errorEl.textContent = '';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password, nickname }),
                });
                const data = await res.json();
                if (!res.ok) { errorEl.textContent = data.error || '注册失败'; return; }

                // Auto login after register
                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password }),
                });
                const loginData = await loginRes.json();
                if (loginRes.ok) {
                    authToken = loginData.token;
                    currentUser = loginData.user;
                    localStorage.setItem('auth_token', authToken);
                    onLoginSuccess();
                }
            } catch (e) {
                errorEl.textContent = '网络错误，请重试';
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }

        async function doLogout() {
            if (authToken) {
                try {
                    await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${authToken}` },
                    });
                } catch (e) {}
            }
            authToken = null;
            currentUser = null;
            localStorage.removeItem('auth_token');
            onLogoutSuccess();
        }

        function onLoginSuccess() {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('userNickname').textContent = currentUser.nickname;
            // Execute pending action if any (user triggered AI before login)
            if (pendingAction) {
                const action = pendingAction;
                pendingAction = null;
                setTimeout(() => action(), 100);
            }
        }

        function onLogoutSuccess() {
            // Don't show auth overlay or disable inputs — user can still browse freely
            document.getElementById('userInfo').classList.add('hidden');
            // Clear forms
            document.getElementById('loginAccount').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('regAccount').value = '';
            document.getElementById('regNickname').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPasswordConfirm').value = '';
            switchAuthTab('login');
        }

        async function checkAuth() {
            if (!authToken) return false;
            try {
                const res = await fetch('/api/auth/check', {
                    headers: { 'Authorization': `Bearer ${authToken}` },
                });
                const data = await res.json();
                if (data.loggedIn) {
                    currentUser = data.user;
                    return true;
                }
            } catch (e) {}
            return false;
        }

        // ===== State =====
        let tableData = [];
        let editorTableId = 0;
        const DEFAULT_ROWS = 5, DEFAULT_COLS = 5;

        // ===== DOM =====
        const chatMessages = document.getElementById('chatMessages');
        const chatArea = document.getElementById('chatArea');
        const textMsg = document.getElementById('textMsg');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const manualBtn = document.getElementById('manualBtn');
        const fileInput = document.getElementById('fileInput');
        const dropOverlay = document.getElementById('dropOverlay');

        // ===== Helpers =====
        function scrollBottom() { chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function formatSize(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }
        function getColLetter(i) { let r=''; let n=i; do { r=String.fromCharCode(65+(n%26))+r; n=Math.floor(n/26)-1; } while(n>=0); return r; }

        function addBotMessage(html) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 msg-in';
            div.innerHTML = `
                <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-200 px-4 py-3 max-w-[90%] text-sm text-gray-700 leading-relaxed">${html}</div>`;
            chatMessages.appendChild(div);
            scrollBottom();
            return div;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 justify-end msg-in';
            div.innerHTML = `
                <div class="bg-blue-500 text-white rounded-2xl rounded-tr-sm shadow-sm border border-blue-400/30 px-4 py-3 max-w-[85%] text-sm leading-relaxed break-all">${escapeHtml(text)}</div>
                <div class="shrink-0 w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>`;
            chatMessages.appendChild(div);
            scrollBottom();
        }

        function addTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex items-start gap-3 msg-in';
            div.innerHTML = `
                <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-200 px-4 py-3">
                    <div class="dot-typing"><span></span><span></span><span></span></div>
                </div>`;
            chatMessages.appendChild(div);
            scrollBottom();
        }
        function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

        // ===== Welcome =====
        addBotMessage(`你好！我是 AI 表格助手 📊<br><br>你可以：<br>• 用自然语言描述需要的表格（如「帮我做一个项目预算表」）<br>• 粘贴逗号或 Tab 分隔的数据<br>• 上传 CSV / Excel 文件<br>• 点击左下角 📐 手动编辑<br><br><span class="text-gray-400 text-xs">AI 智能解析，秒级生成专业表格。</span>`);

        // ===== Table Rendering =====
        function renderTableHtml(data, editable, tableId) {
            if (!data.length) return '<p class="text-gray-400 text-xs">表格为空</p>';
            const maxCols = Math.max(...data.map(r => r.length));
            let html = '<div class="overflow-x-auto max-h-64 rounded-lg border border-gray-200"><table class="chat-table"><thead><tr>';
            html += '<th class="text-center text-xs text-gray-400 w-8 bg-gray-50">#</th>';
            for (let c = 0; c < maxCols; c++) html += `<th class="text-center">${getColLetter(c)}</th>`;
            html += '</tr></thead><tbody>';
            for (let r = 0; r < data.length; r++) {
                html += `<tr><td class="text-center text-xs text-gray-400 bg-gray-50">${r+1}</td>`;
                for (let c = 0; c < maxCols; c++) {
                    const val = (data[r] && data[r][c] !== undefined) ? data[r][c] : '';
                    if (editable) {
                        html += `<td contenteditable="true" data-tid="${tableId}" data-row="${r}" data-col="${c}" onblur="cellEdited(this)" onkeydown="cellKeydown(event,this)">${escapeHtml(String(val))}</td>`;
                    } else {
                        html += `<td>${escapeHtml(String(val))}</td>`;
                    }
                }
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            return html;
        }

        function cellEdited(el) {
            const tid = el.dataset.tid;
            const r = parseInt(el.dataset.row), c = parseInt(el.dataset.col);
            if (tableData[r]) tableData[r][c] = el.textContent;
        }

        function cellKeydown(e, el) {
            const r = parseInt(el.dataset.row), c = parseInt(el.dataset.col);
            const tid = el.dataset.tid;
            if (e.key === 'Tab') {
                e.preventDefault();
                const nc = e.shiftKey ? c-1 : c+1;
                const next = document.querySelector(`td[data-tid="${tid}"][data-row="${r}"][data-col="${nc}"]`);
                if (next) next.focus();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const nr = r+1;
                const next = document.querySelector(`td[data-tid="${tid}"][data-row="${nr}"][data-col="${c}"]`);
                if (next) next.focus();
            }
        }

        // ===== Table Actions in Chat =====
        function buildTableMsg(data, tid) {
            const tableHtml = renderTableHtml(data, true, tid);
            const rows = data.length, cols = data.length ? Math.max(...data.map(r=>r.length)) : 0;
            return `${tableHtml}<div class="flex flex-wrap items-center gap-2 mt-2 pt-2 border-t border-gray-100"><span class="text-xs text-gray-400 mr-auto">${rows} 行 × ${cols} 列</span><button onclick="tableAction(${tid},'csv')" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs rounded-lg">📄 导出 CSV</button><button onclick="tableAction(${tid},'xlsx')" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs rounded-lg">📊 导出 Excel</button><button onclick="tableAction(${tid},'edit')" class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded-lg">✏️ 全屏编辑</button></div>`;
        }

        const tableSnapshots = {};

        function addTableToChat(data) {
            editorTableId++;
            const tid = editorTableId;
            tableData = JSON.parse(JSON.stringify(data));
            tableSnapshots[tid] = JSON.parse(JSON.stringify(data));
            removeTyping();
            addBotMessage(buildTableMsg(data, tid));
        }

        function tableAction(tid, action) {
            const data = tableSnapshots[tid];
            if (!data) return;
            if (action === 'csv') exportCSV(data);
            else if (action === 'xlsx') exportExcel(data);
            else if (action === 'edit') openEditor(data);
        }

        // ===== Parse User Input (for paste data, no AI) =====
        function parseText(text) {
            const lines = text.trim().split('\n');
            return lines.map(line => {
                if (line.includes('\t')) return line.split('\t');
                return line.split(',').map(s => s.trim());
            });
        }

        function isPasteData(text) {
            // Multi-line with commas or tabs
            if (text.includes('\n') && (text.includes(',') || text.includes('\t'))) return true;
            // Single line with commas/tabs and multiple values
            if (!text.includes('\n') && (text.includes(',') || text.includes('\t'))) {
                const parts = text.includes('\t') ? text.split('\t') : text.split(',');
                if (parts.length > 1) return true;
            }
            return false;
        }

        // ===== Handle User Input =====
        async function handleInput(text) {
            if (!text.trim()) return;
            addUserMessage(text);

            // Check if it's pasted data (no AI needed)
            if (isPasteData(text)) {
                addTyping();
                setTimeout(() => {
                    const data = parseText(text);
                    if (data.length > 0 && data[0].length > 0) {
                        addTableToChat(data);
                    } else {
                        removeTyping();
                        addBotMessage('无法解析粘贴的数据，请检查格式。');
                    }
                }, 300);
                return;
            }

            // Natural language → need AI → check login first
            if (!authToken) {
                // Show auth modal; save this action to resume after login
                pendingAction = () => callAI(text);
                document.getElementById('authOverlay').classList.remove('hidden');
                return;
            }

            await callAI(text);
        }

        async function callAI(text) {
            addTyping();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`,
                    },
                    body: JSON.stringify({ messages: text }),
                });

                if (res.status === 401) {
                    removeTyping();
                    addBotMessage('⚠️ 登录已过期，请重新登录。');
                    doLogout();
                    // Show auth modal so user can re-login
                    document.getElementById('authOverlay').classList.remove('hidden');
                    return;
                }

                if (!res.ok) {
                    removeTyping();
                    addBotMessage('❌ AI 服务暂时不可用，请稍后再试。');
                    return;
                }

                // Handle SSE streaming
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                // Create a streaming message bubble
                editorTableId++;
                const tid = editorTableId;
                const streamDiv = document.createElement('div');
                streamDiv.className = 'flex items-start gap-3 msg-in';
                streamDiv.innerHTML = `
                    <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                        <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                    </div>
                    <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-200 px-4 py-3 max-w-[90%] text-sm text-gray-700 leading-relaxed">
                        <div class="dot-typing"><span></span><span></span><span></span></div>
                    </div>`;
                chatMessages.appendChild(streamDiv);
                scrollBottom();

                const contentDiv = streamDiv.querySelector('.bg-white');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith('data: ')) continue;

                        const data = trimmed.substring(6);
                        if (data === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(data);
                            if (parsed.content) {
                                fullContent += parsed.content;
                                // Show streaming text preview
                                contentDiv.innerHTML = `<pre class="whitespace-pre-wrap text-xs text-gray-500 font-mono">${escapeHtml(fullContent)}</pre>`;
                                scrollBottom();
                            }
                        } catch (e) {}
                    }
                }

                // Try to parse the AI response as JSON table
                try {
                    // Try to extract JSON from the response
                    let jsonMatch = fullContent.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        if (parsed.headers && parsed.rows) {
                            // Convert { headers, rows } to flat array
                            const data = [parsed.headers, ...parsed.rows];
                            tableData = JSON.parse(JSON.stringify(data));
                            tableSnapshots[tid] = JSON.parse(JSON.stringify(data));
                            contentDiv.innerHTML = buildTableMsg(data, tid);
                            scrollBottom();
                            return;
                        }
                    }
                    // If JSON parse fails, show raw text
                    contentDiv.innerHTML = `<div>${escapeHtml(fullContent)}</div><p class="text-xs text-gray-400 mt-2">AI 返回格式异常，请尝试更详细的描述。</p>`;
                } catch (e) {
                    contentDiv.innerHTML = `<div>${escapeHtml(fullContent)}</div><p class="text-xs text-gray-400 mt-2">AI 返回格式异常，请尝试更详细的描述。</p>`;
                }
            } catch (e) {
                removeTyping();
                addBotMessage('❌ 网络错误，请检查网络连接后重试。');
            }
        }

        // ===== File Import =====
        function importFile(file) {
            addUserMessage(`📎 ${file.name} (${formatSize(file.size)})`);
            addTyping();
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    let parsed = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    parsed = parsed.filter(row => row.some(cell => cell !== ''));
                    setTimeout(() => addTableToChat(parsed), 500);
                } catch (err) {
                    removeTyping();
                    addBotMessage(`❌ 文件解析失败：${err.message}`);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ===== Export =====
        function getExportData(data) {
            const maxCols = Math.max(...data.map(r => r.length));
            return data.map(row => { const p = [...row]; while(p.length < maxCols) p.push(''); return p; });
        }
        function downloadBlob(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = name;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        function exportCSV(data) {
            if (!data.length) return;
            const ed = getExportData(data);
            const ws = XLSX.utils.aoa_to_sheet(ed);
            const csv = XLSX.utils.sheet_to_csv(ws);
            downloadBlob(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), '表格.csv');
        }
        function exportExcel(data) {
            if (!data.length) return;
            const ed = getExportData(data);
            const ws = XLSX.utils.aoa_to_sheet(ed);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
            XLSX.writeFile(wb, '表格.xlsx');
        }

        // ===== Fullscreen Editor =====
        function openEditor(data) {
            tableData = JSON.parse(JSON.stringify(data));
            document.getElementById('fullEditor').classList.add('active');
            renderEditor();
        }
        function editorDone() {
            document.getElementById('fullEditor').classList.remove('active');
            addBotMessage('✅ 已退出编辑模式。你可以继续描述新表格或导出数据。');
        }
        function renderEditor() {
            const container = document.getElementById('editorTableContainer');
            if (!tableData.length) { container.innerHTML = '<p class="text-gray-400 text-sm p-4">暂无数据</p>'; return; }
            const maxCols = Math.max(...tableData.map(r => r.length));
            let html = '<table class="editor-table"><thead><tr><th class="text-center text-xs text-gray-400 w-10">#</th>';
            for (let c = 0; c < maxCols; c++) html += `<th class="text-center">${getColLetter(c)}</th>`;
            html += '</tr></thead><tbody>';
            for (let r = 0; r < tableData.length; r++) {
                html += `<tr><td class="text-center text-xs text-gray-400 bg-gray-50">${r+1}</td>`;
                for (let c = 0; c < maxCols; c++) {
                    const val = (tableData[r] && tableData[r][c] !== undefined) ? tableData[r][c] : '';
                    html += `<td contenteditable="true" data-erow="${r}" data-ecol="${c}" onblur="editorCellEdit(this)" onkeydown="cellKeydown(event,this)">${escapeHtml(String(val))}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        function editorCellEdit(el) {
            const r = parseInt(el.dataset.erow), c = parseInt(el.dataset.ecol);
            if (tableData[r]) tableData[r][c] = el.textContent;
        }
        function editorAddRow() { const mc = tableData.length ? Math.max(...tableData.map(r=>r.length)) : DEFAULT_COLS; tableData.push(Array(mc).fill('')); renderEditor(); }
        function editorAddCol() { tableData.forEach(r => r.push('')); renderEditor(); }
        function editorDelRow() { if (tableData.length > 1) { tableData.pop(); renderEditor(); } }
        function editorDelCol() { const mc = tableData.length ? Math.max(...tableData.map(r=>r.length)) : 0; if (mc > 1) { tableData.forEach(r => r.pop()); renderEditor(); } }
        function editorExportCSV() { exportCSV(tableData); }
        function editorExportExcel() { exportExcel(tableData); }

        // ===== Event Listeners =====
        sendBtn.addEventListener('click', () => { const v = textMsg.value.trim(); if (v) { handleInput(v); textMsg.value = ''; } });
        textMsg.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });

        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) importFile(e.target.files[0]); e.target.value = ''; });

        manualBtn.addEventListener('click', () => {
            if (!tableData.length) tableData = Array.from({length: DEFAULT_ROWS}, () => Array(DEFAULT_COLS).fill(''));
            openEditor(tableData);
        });

        // Global drag & drop
        let dragCounter = 0;
        document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
        document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
            const files = Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.(csv|xlsx|xls)$/i));
            if (files.length) importFile(files[0]);
        });

        // Sync tableSnapshots when editing in chat
        window.cellEdited = function(el) {
            cellEdited(el);
            const tid = el.dataset.tid;
            if (tid && tableSnapshots[tid]) {
                tableSnapshots[tid] = JSON.parse(JSON.stringify(tableData));
            }
        };

        // ===== Init: Check Auth (non-blocking) =====
        (async function init() {
            const loggedIn = await checkAuth();
            if (loggedIn) {
                // Just update user info display; no overlay/enable logic needed
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('userNickname').textContent = currentUser.nickname;
            }
            // Page is fully usable regardless of login status
        })();
    </script>
    <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
    </script>
<script>
(function(){
  let deferredPrompt;
  const installBtn = document.getElementById('pwa-install-btn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'flex';
  });
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    if (installBtn) installBtn.style.display = 'none';
  }
})();
</script>
</body>
